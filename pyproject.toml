[project]
name = "ibtax"
version = "0.1.0"
description = "Italian tax report generator for Interactive Brokers accounts"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "aiohttp>=3.9",
    "aiosqlite>=0.20",
    "python-dotenv>=1.0",
    "openpyxl>=3.1",
    "fpdf2>=2.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-timeout>=2.3",
    "ruff>=0.8",
]

[project.scripts]
ibtax = "ibtax.cli:main"

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
timeout = 10

[tool.ruff]
target-version = "py312"
line-length = 100
